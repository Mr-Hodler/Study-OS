<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.5" stop-color="#0e1a39"/>
      <stop offset="1" stop-color="#15235c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#9fb4e6" opacity="0.10"/>
    </pattern>
    <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <ellipse cx="1010" cy="300" rx="430" ry="360" fill="url(#glow)"/>

  <!-- ============ LEFT: brand ============ -->
  <g>
    <!-- monogram mark -->
    <rect x="92" y="150" width="58" height="58" rx="14" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <g stroke="url(#accent)" stroke-width="2.6" opacity="0.85">
      <line x1="108" y1="172" x2="134" y2="166"/>
      <line x1="108" y1="172" x2="121" y2="192"/>
      <line x1="134" y1="166" x2="121" y2="192"/>
    </g>
    <circle cx="108" cy="172" r="4.2" fill="#38bdf8"/>
    <circle cx="134" cy="166" r="4.2" fill="#a78bfa"/>
    <circle cx="121" cy="192" r="4.2" fill="#60a5fa"/>

    <text x="170" y="196" font-size="30" font-weight="600" fill="#93c5fd" letter-spacing="6">STUDY&#160;OPERATING&#160;SYSTEM</text>

    <text x="90" y="318" font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-2">Study OS</text>
    <rect x="96" y="338" width="150" height="7" rx="3.5" fill="url(#accent)"/>

    <text x="96" y="392" font-size="29" font-weight="500" fill="#d3dcea" fill-opacity="0.92">Turn rough notes into deep, consistent study pages.</text>
    <text x="96" y="430" font-size="29" font-weight="500" fill="#aab8d4">Sourced. Structured. Repeatable. Notion or PDF.</text>

    <!-- chips -->
    <g font-size="21" font-weight="600">
      <rect x="96" y="470" width="186" height="46" rx="23" fill="#16233f" stroke="#274063" stroke-width="1"/>
      <text x="118" y="500" fill="#cfe0ff">Build · Reformat · Explain</text>
      <rect x="298" y="470" width="232" height="46" rx="23" fill="#16233f" stroke="#274063" stroke-width="1"/>
      <text x="320" y="500" fill="#cfe0ff">Mermaid · Tables · Sources</text>
      <rect x="546" y="470" width="196" height="46" rx="23" fill="#16233f" stroke="#274063" stroke-width="1"/>
      <text x="568" y="500" fill="#cfe0ff">Spaced repetition</text>
    </g>

    <text x="96" y="572" font-size="19" fill="#5e6f92">MIT licensed  ·  Claude Code &amp; Cowork plugin  ·  github.com/Mr-Hodler/Study-OS</text>
  </g>

  <!-- ============ RIGHT: structured pages + knowledge graph ============ -->
  <g transform="translate(815,150)">
    <!-- back card -->
    <g transform="rotate(8 150 170)" opacity="0.55">
      <rect x="60" y="40" width="270" height="300" rx="18" fill="#1c2c4d" stroke="#2c4170" stroke-width="1.5"/>
    </g>
    <!-- mid card -->
    <g transform="rotate(-5 150 170)" opacity="0.8">
      <rect x="35" y="30" width="270" height="300" rx="18" fill="#22335a" stroke="#33508a" stroke-width="1.5"/>
    </g>
    <!-- front card -->
    <g filter="url(#cardshadow)">
      <rect x="20" y="20" width="280" height="320" rx="20" fill="#0f1b34" stroke="#3b5da6" stroke-width="2"/>
      <!-- header / callout -->
      <rect x="44" y="48" width="232" height="40" rx="10" fill="#16294d" stroke="#2f6fb0" stroke-width="1"/>
      <circle cx="64" cy="68" r="6" fill="#38bdf8"/>
      <rect x="80" y="62" width="150" height="11" rx="5.5" fill="#7fb0e6"/>
      <!-- chapter heading -->
      <rect x="44" y="108" width="120" height="14" rx="7" fill="url(#accent)"/>
      <!-- text lines -->
      <rect x="44" y="138" width="220" height="9" rx="4.5" fill="#3a5180"/>
      <rect x="44" y="156" width="200" height="9" rx="4.5" fill="#33476f"/>
      <rect x="44" y="174" width="210" height="9" rx="4.5" fill="#33476f"/>
      <!-- mini table -->
      <rect x="44" y="198" width="232" height="58" rx="8" fill="none" stroke="#2c4574" stroke-width="1.5"/>
      <line x1="44" y1="217" x2="276" y2="217" stroke="#2c4574" stroke-width="1.5"/>
      <line x1="121" y1="198" x2="121" y2="256" stroke="#2c4574" stroke-width="1.5"/>
      <line x1="198" y1="198" x2="198" y2="256" stroke="#2c4574" stroke-width="1.5"/>
      <!-- mini mermaid flow -->
      <g>
        <circle cx="66" cy="292" r="11" fill="#16294d" stroke="#38bdf8" stroke-width="2"/>
        <circle cx="150" cy="292" r="11" fill="#16294d" stroke="#60a5fa" stroke-width="2"/>
        <circle cx="234" cy="292" r="11" fill="#16294d" stroke="#a78bfa" stroke-width="2"/>
        <line x1="77" y1="292" x2="139" y2="292" stroke="#3b5da6" stroke-width="2"/>
        <line x1="161" y1="292" x2="223" y2="292" stroke="#3b5da6" stroke-width="2"/>
      </g>
    </g>

    <!-- knowledge graph cluster, top-right -->
    <g transform="translate(300,-30)">
      <g stroke="#4b6bd6" stroke-width="2" opacity="0.6">
        <line x1="40" y1="40" x2="120" y2="20"/>
        <line x1="40" y1="40" x2="80" y2="120"/>
        <line x1="120" y1="20" x2="150" y2="110"/>
        <line x1="80" y1="120" x2="150" y2="110"/>
        <line x1="80" y1="120" x2="60" y2="200"/>
        <line x1="150" y1="110" x2="140" y2="200"/>
      </g>
      <g>
        <circle cx="40" cy="40" r="9" fill="#38bdf8"/>
        <circle cx="120" cy="20" r="7" fill="#a78bfa"/>
        <circle cx="150" cy="110" r="8" fill="#60a5fa"/>
        <circle cx="80" cy="120" r="10" fill="#818cf8"/>
        <circle cx="60" cy="200" r="7" fill="#38bdf8"/>
        <circle cx="140" cy="200" r="8" fill="#a78bfa"/>
      </g>
    </g>
  </g>
</svg>
